<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Agencia de Seguros</title>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- PrimeVue CSS -->
    <link href="https://unpkg.com/primevue@3.52.0/resources/themes/saga-blue/theme.css" rel="stylesheet">
    <link href="https://unpkg.com/primevue@3.52.0/resources/primevue.min.css" rel="stylesheet">
    <link href="https://unpkg.com/primeicons@7.0.0/primeicons.css" rel="stylesheet">

    <!-- PrimeFlex CSS (para utilidades de layout) -->
    <link href="https://unpkg.com/primeflex@3.3.1/primeflex.min.css" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PrimeVue Components CDN (individualmente, si no se usa un bundler) -->
    <script src="https://unpkg.com/primevue@3.52.0/button/button.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/card/card.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/inputtext/inputtext.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/message/message.min.js"></script>

</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="app" class="max-w-md w-full bg-white p-8 rounded-lg shadow-xl text-center">
        <h2 class="text-3xl font-bold mb-6 text-gray-800">Iniciar Sesión</h2>
        <div class="p-fluid">
            <div class="mb-5">
                <span class="p-float-label">
                    <p-inputtext id="username" v-model="username"></p-inputtext>
                    <label for="username">Usuario</label>
                </span>
            </div>
            <div class="mb-5">
                <span class="p-float-label">
                    <p-inputtext id="password" type="password" v-model="password" @keyup.enter="login"></p-inputtext>
                    <label for="password">Contraseña</label>
                </span>
            </div>
            <p-button label="Entrar" icon="pi pi-sign-in" class="w-full py-3 text-lg p-button-primary" @click="login"></p-button>
            <p-message v-if="loginError" severity="error" :closable="false" class="mt-4">{{ loginError }}</p-message>
        </div>
    </div>

    <!-- Main application script -->
    <script type="module" src="./login.js"></script>
</body>
</html>
