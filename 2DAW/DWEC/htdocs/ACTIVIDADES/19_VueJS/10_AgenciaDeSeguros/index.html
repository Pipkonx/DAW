<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia de Seguros</title>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- PrimeVue CSS -->
    <link href="https://unpkg.com/primevue@3.52.0/resources/themes/saga-blue/theme.css" rel="stylesheet">
    <link href="https://unpkg.com/primevue@3.52.0/resources/primevue.min.css" rel="stylesheet">
    <link href="https://unpkg.com/primeicons@7.0.0/primeicons.css" rel="stylesheet">

    <!-- PrimeFlex CSS (para utilidades de layout) -->
    <link href="https://unpkg.com/primeflex@3.3.1/primeflex.min.css" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PrimeVue Components CDN (individualmente, si no se usa un bundler) -->
    <script src="https://unpkg.com/primevue@3.52.0/button/button.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/card/card.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/inputtext/inputtext.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/datatable/datatable.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/column/column.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/dialog/dialog.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/dropdown/dropdown.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/calendar/calendar.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/inputnumber/inputnumber.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/tag/tag.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/message/message.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/menubar/menubar.min.js"></script>
    <script src="https://unpkg.com/primevue@3.52.0/tooltip/tooltip.min.js"></script>

</head>
<body>
    <div id="app" class="max-w-[1200px] mx-auto my-5 bg-white p-5 rounded-lg shadow-md">
        <div v-if="!isLoggedIn" class="max-w-[400px] mx-auto my-24 p-8 rounded-lg shadow-xl bg-white text-center">
            <h2 class="mb-6 text-[#333]">Iniciar Sesión</h2>
            <div class="p-fluid">
                <div class="mb-5">
                    <span class="p-float-label">
                        <p-inputtext id="username" v-model="loginForm.username"></p-inputtext>
                        <label for="username">Usuario</label>
                    </span>
                </div>
                <div class="mb-5">
                    <span class="p-float-label">
                        <p-inputtext id="password" type="password" v-model="loginForm.password" @keyup.enter="login"></p-inputtext>
                        <label for="password">Contraseña</label>
                    </span>
                </div>
                <p-button label="Entrar" icon="pi pi-sign-in" class="w-full py-3 text-lg p-button-primary" @click="login"></p-button>
                <div v-if="loginError" class="text-red-500 mt-4 font-medium">{{ loginError }}</div>
            </div>
        </div>

        <div v-else>
            <p-menubar :model="menuItems" class="mb-5 rounded-md shadow-sm">
                <template #end>
                    <p-button label="Salir" icon="pi pi-sign-out" class="p-button-danger" @click="logout"></p-button>
                </template>
            </p-menubar>

            <div class="mt-4">
                <dashboard v-if="currentView === 'dashboard'" 
                    :clients="clients" 
                    :policies="policies" 
                    :payments="payments"
                    :selectedClient="selectedClient"
                    @view-client="viewClient"
                    @refresh-data="fetchAllData">
                </dashboard>

                <reports v-if="currentView === 'reports'" 
                    :clients="clients" 
                    :policies="policies">
                </reports>
            </div>
        </div>
    </div>

    <!-- Main application script -->
    <script type="module" src="./app.js"></script>
</body>
</html>
